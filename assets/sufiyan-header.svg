    <text x="860" y="110" fill="#8B949E" font-family="monospace" font-size="12">product / filewalatool</text>

    <circle cx="804" cy="178" r="35" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
    <text x="783" y="189" fill="#E6EDF3" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">FW</text>
    <text x="855" y="170" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">FileWalaTool</text>
    <text x="855" y="195" fill="#8B949E" font-family="Arial, Helvetica, sans-serif" font-size="13">PDF · Image · Document utilities</text>

    <rect x="770" y="233" width="106" height="73" rx="12" fill="#0D1117" stroke="#30363D"/>
    <text x="790" y="258" fill="#7EE787" font-family="monospace" font-size="12">STATUS</text>
    <text x="790" y="284" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Live</text>

    <rect x="891" y="233" width="106" height="73" rx="12" fill="#0D1117" stroke="#30363D"/>
    <text x="910" y="258" fill="#58A6FF" font-family="monospace" font-size="12">MODE</text>
    <text x="910" y="284" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Browser</text>

    <rect x="1012" y="233" width="101" height="73" rx="12" fill="#0D1117" stroke="#30363D"/>
    <text x="1030" y="258" fill="#C4B5FD" font-family="monospace" font-size="12">FOCUS</text>
    <text x="1030" y="284" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">UX</text>

    <rect x="770" y="322" width="343" height="16" rx="8" fill="#0D1117"/>
