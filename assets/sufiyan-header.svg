<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Muhammad Sufiyan — Java Full Stack Developer and Founder of FileWalaTool">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B111A"/>
      <stop offset="55%" stop-color="#0D1624"/>
      <stop offset="100%" stop-color="#0B111A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#7EE787"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182536"/>
      <stop offset="100%" stop-color="#101923"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="translate(1054 105) rotate(130) scale(310 280)">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientTransform="translate(972 337) rotate(-35) scale(300 220)">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#8B949E" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#010409" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="26" fill="url(#background)"/>
  <rect width="1200" height="420" rx="26" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="26" fill="url(#blueGlow)"/>
  <rect width="1200" height="420" rx="26" fill="url(#greenGlow)"/>

  <rect x="54" y="56" width="6" height="307" rx="3" fill="url(#accent)"/>
