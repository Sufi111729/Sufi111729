  <text x="88" y="160" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Muhammad Sufiyan</text>
  <text x="90" y="203" fill="#A7C7F5" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600">Java Full Stack Developer · Founder of FileWalaTool</text>
  <text x="90" y="242" fill="#AAB7C4" font-family="Arial, Helvetica, sans-serif" font-size="18">Building fast, useful web products with Java, Spring Boot, React, and SQL.</text>

  <g transform="translate(88 278)">
    <rect x="0" y="0" width="78" height="31" rx="15.5" fill="#172A3F" stroke="#2D4F75"/>
    <text x="19" y="20" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">JAVA</text>
    <rect x="90" y="0" width="131" height="31" rx="15.5" fill="#142B24" stroke="#285B49"/>
    <text x="109" y="20" fill="#BBF7D0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">SPRING BOOT</text>
    <rect x="233" y="0" width="83" height="31" rx="15.5" fill="#222647" stroke="#464D8F"/>
    <text x="252" y="20" fill="#DDD6FE" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">REACT</text>
    <rect x="328" y="0" width="69" height="31" rx="15.5" fill="#2E2616" stroke="#6B5522"/>
    <text x="348" y="20" fill="#FDE68A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">SQL</text>
  </g>

  <circle cx="95" cy="345" r="5" fill="#7EE787"/>
  <text x="111" y="350" fill="#C9D1D9" font-family="Arial, Helvetica, sans-serif" font-size="14">Open to Java and Full Stack opportunities</text>

  <g filter="url(#shadow)">
